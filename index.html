<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chunkbase Seed Map Coordinate Convertor</title>
  <style>
    :root {
      --bg: #f6f5ef;
      --card: #fffdf6;
      --text: #2a261f;
      --muted: #6a6256;
      --accent: #c55c1b;
      --ok: #2f7d32;
      --err: #b42318;
      --border: #e7dcc8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 20% 0%, #fff4d5 0%, transparent 45%),
        radial-gradient(circle at 90% 30%, #ffe4c4 0%, transparent 35%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(760px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 10px 28px rgba(80, 62, 36, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.3rem, 2.5vw, 1.9rem);
      letter-spacing: 0.02em;
    }

    .hint {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.4;
    }

    .tabs {
      display: flex;
      gap: 8px;
      margin: 14px 0 16px;
      flex-wrap: wrap;
    }

    .tab-btn {
      background: #8c7a66;
      color: #fff;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: var(--accent);
    }

    .tab-panel {
      display: none;
      animation: fade-in 220ms ease-out;
    }

    .tab-panel.active {
      display: block;
    }

    @keyframes fade-in {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .field {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 1rem;
      color: var(--text);
      background: #fffcf4;
    }

    .field:focus {
      outline: 2px solid #f2c5a4;
      border-color: #d29562;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      border: 0;
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
    }

    button.secondary {
      background: #8c7a66;
    }

    .result {
      margin-top: 18px;
      border: 1px dashed var(--border);
      border-radius: 12px;
      padding: 14px;
      background: #fff;
    }

    .row {
      display: grid;
      grid-template-columns: 130px 1fr auto;
      gap: 8px;
      align-items: baseline;
      margin: 8px 0;
      word-break: break-word;
    }

    .label {
      color: var(--muted);
      font-weight: 700;
    }

    .value {
      font-size: 1.03rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .copy-btn {
      background: #4c8f63;
      padding: 7px 10px;
      border-radius: 8px;
      font-size: 0.9rem;
      line-height: 1;
    }

    .message {
      margin-top: 12px;
      min-height: 1.3em;
      font-weight: 700;
    }

    .message.ok {
      color: var(--ok);
    }

    .message.error {
      color: var(--err);
    }

    @media (max-width: 520px) {
      .card {
        padding: 16px;
      }

      .row {
        grid-template-columns: 1fr auto;
        gap: 2px;
      }

      .label {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Chunkbase Seed Map Coordinate Convertor</h1>
    <p class="hint">Convert coordinates between Overworld and Nether. The new tab multiplies Nether X/Z by 8 and does not handle Y.</p>

    <div class="tabs" role="tablist" aria-label="Coordinate converter mode">
      <button id="tab-overworld-to-nether" class="tab-btn active" type="button" role="tab" aria-selected="true" aria-controls="panel-overworld-to-nether">Overworld to Nether</button>
      <button id="tab-nether-to-overworld" class="tab-btn" type="button" role="tab" aria-selected="false" aria-controls="panel-nether-to-overworld">Nether to Overworld</button>
    </div>

    <section id="panel-overworld-to-nether" class="tab-panel active" role="tabpanel" aria-live="polite">
      <label for="tp-input" class="hint">Input /tp command</label>
      <input
        id="tp-input"
        class="field"
        type="text"
        autocomplete="off"
        placeholder="/tp -16024 ~ 6664"
        value="/tp -16024 ~ 6664"
      >

      <div class="actions">
        <button id="convert-btn" type="button">Convert</button>
        <button id="clear-btn" class="secondary" type="button">Clear</button>
      </div>

      <section class="result">
        <div class="row">
          <div class="label">XYZ</div>
          <div id="xyz-output" class="value">-</div>
          <button id="copy-xyz-btn" class="copy-btn" type="button">Copy</button>
        </div>
        <div class="row">
          <div class="label">Nether XYZ</div>
          <div id="nether-output" class="value">-</div>
          <button id="copy-nether-btn" class="copy-btn" type="button">Copy</button>
        </div>
        <div id="status" class="message"></div>
      </section>
    </section>

    <section id="panel-nether-to-overworld" class="tab-panel" role="tabpanel" aria-live="polite">
      <label for="nether-input" class="hint">Input nether X Z (example: <strong>-2003 833</strong>)</label>
      <input
        id="nether-input"
        class="field"
        type="text"
        autocomplete="off"
        placeholder="-2003 833"
        value="-2003 833"
      >

      <div class="actions">
        <button id="convert-back-btn" type="button">Convert</button>
        <button id="clear-back-btn" class="secondary" type="button">Clear</button>
      </div>

      <section class="result">
        <div class="row">
          <div class="label">Overworld XZ</div>
          <div id="overworld-output" class="value">-</div>
          <button id="copy-overworld-btn" class="copy-btn" type="button">Copy</button>
        </div>
        <div id="status-back" class="message"></div>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
